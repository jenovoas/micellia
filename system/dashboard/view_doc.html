    <style>
        /* Estilos cuando se carga dentro de un iframe (Modal del Tour) */
        body.is-embedded {
            background: transparent !important;
        }
        body.is-embedded .navbar,
        body.is-embedded .doc-nav {
            display: none !important;
        }
        body.is-embedded .article-wrapper {
            padding: 0.5rem 0 1rem !important;
        }
        body.is-embedded #canvas-container {
            display: none !important;
        }
        body.is-embedded .prose {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            box-shadow: none !important;
        }
        body.is-embedded #wa-bot-widget {
            display: none !important;
        }

        /* Variables específicas del lector en armonía con public.css?v=2 */
        :root {
            --bg-card-reader: rgba(12, 25, 15, 0.92);
            --border-reader: rgba(195, 181, 159, 0.12);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.45;
            pointer-events: none;
        }

        .doc-category {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-green-light);
            background: rgba(74,140,66,0.1);
            border: 1px solid rgba(74,140,66,0.2);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
        }

        /* Article container */
        .article-wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 7rem 1.5rem 6rem;
            box-sizing: border-box;
        }

        /* Prose / Markdown typography */
        .prose {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 3rem;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            line-height: 1.8;
        }

        /* Recipe images and realistic steam animation */
        .recipe-image-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            border-radius: 16px;
            overflow: hidden;
            margin: 2rem 0;
            border: 1px solid rgba(195, 181, 159, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        .recipe-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recipe-image-wrapper:hover img {
            transform: scale(1.04);
        }

        .steam-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80%;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
        }

        .steam-particle {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(6px);
            animation: steamRise 4s infinite ease-out;
            opacity: 0;
        }

        @keyframes steamRise {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-200px) scale(2.2) rotate(20deg);
                opacity: 0;
            }
        }

        .prose h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(195,181,159,0.2);
        }

        .prose .doc-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            margin-bottom: 2.5rem;
        }

        .prose h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(195,181,159,0.1);
        }

        .prose h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #b5d4ad;
            margin: 2rem 0 0.75rem;
        }

        .prose h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 1.5rem 0 0.5rem;
        }

        .prose p {
            color: #c8d5c4;
            margin-bottom: 1.25rem;
            font-size: 1.02rem;
        }

        .prose strong { color: var(--text-primary); font-weight: 600; }

        .prose em { font-style: italic; color: var(--accent-gold); }

        .prose a {
            color: var(--accent-green-light);
            text-decoration: none;
            border-bottom: 1px solid rgba(74,140,66,0.3);
            transition: all 0.2s;
        }
        .prose a:hover { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

        .prose ul, .prose ol {
            margin: 1rem 0 1.5rem 1.5rem;
            color: #c8d5c4;
        }
        .prose li { margin-bottom: 0.4rem; line-height: 1.7; }

        .prose blockquote {

            padding: 1rem 1.5rem;
            border-radius: 0 12px 12px 0;
            margin: 1.5rem 0;
            color: var(--text-muted);

        }

        .prose code {

            font-size: 0.85em;
            color: var(--accent-green-light);
            background: rgba(74,140,66,0.08);
            padding: 0.15rem 0.4rem;
            border-radius: 5px;

        .prose pre {

            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;

        .prose pre code {

            color: #9fe89d;

        .prose table {

            text-align: left;
            border-bottom: 1px solid rgba(195,181,159,0.2);

            border-top: 1px solid var(--border);

        /* Loading state */

            color: var(--text-muted);

        .loading-spinner {

        /* Nav footer links */

            justify-content: space-between;
            margin-top: 2rem;

        .doc-nav a {

        @media (max-width: 768px) {

        /* BARRA DE PROGRESO DE LECTURA */
        .progress-container {
            position: fixed;
            top: 70px; /* justo debajo del navbar que mide 70px */

            width: 100%;

            display: flex;
            justify-content: space-between;
            align-items: center;

        .faq-trigger:hover {

        .faq-item.active .faq-content {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid rgba(195, 181, 159, 0.08);

        .faq-content p {

        .learning-card {
            background: linear-gradient(135deg, rgba(12, 25, 15, 0.98) 0%, rgba(20, 38, 24, 0.98) 100%);
            border: 1px solid rgba(195, 181, 159, 0.25);

            overflow: hidden;

            height: 100%;

            margin-top: 0 !important;

            align-items: center;
            gap: 0.6rem;
            border: none !important;

        .learning-card ul {

        .learning-card li {

            gap: 0.85rem;

            user-select: none;

        }
        .learning-card li.completed {

        .learning-card .checkbox-icon {

        }
        .learning-card li.completed .checkbox-icon {

        }
        .learning-card p {
            margin: 0 !important;
            font-size: 0.95rem !important;
            line-height: 1.5 !important;

        /* ANIMACIÓN DE ENTRADA SCROLL */
        .reveal-item {

        }

    </style>
</head>

    <script>
    // Detectar si está en un iframe y aplicar clase
    if (window.self !== window.top) {
        document.body.classList.add('is-embedded');
    }

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    let filePath = params.get('file');
    let titleParam = params.get('title');

    let docId = params.get('id');
    if (!docId && filePath) {
        const parts = filePath.split('/');
        const filename = parts[parts.length - 1];
        docId = filename.replace('.md', '');
    }

    // Mapeo retrocompatible si se pasa 'doc' en lugar de 'file'
    const docParam = params.get('doc');
    if (!filePath && docParam) {
        filePath = `docs/${docParam}.md`;
        if (!docId) docId = docParam;
        
        // Mapear un título por defecto según el nombre del doc para que no quede vacío
        if (!titleParam) {
            if (docParam === 'alim_tiene_proteinas') titleParam = 'La Revolución de la Proteína Fúngica';
            else if (docParam === 'cienc_economia_circular') titleParam = 'Economía Circular y Suelo Vivo';
            else if (docParam === 'alim_como_cocinarlo') titleParam = 'Guía y Secretos Gastronómicos';
            else titleParam = 'Artículo Científico';
        }
    }

    // Set page title
    if (titleParam) {
        document.title = `${titleParam} · Micelia`;
    }

    // Fetch and render markdown
    async function loadDoc() {
        if (!filePath) {
            showError('No se especificó ningún documento.');
            return;
        }

        // Mostrar botón de edición si corresponde
        const userStr = localStorage.getItem("micelia_current_user");
        const currentUser = userStr ? JSON.parse(userStr) : null;
        if (currentUser && (currentUser.role === 'editor' || currentUser.role === 'operator')) {
            const editBtn = document.getElementById("quick-edit-btn");
            if (editBtn) editBtn.style.display = "inline-flex";
        }

        // Primero intentar cargar desde localStorage
        if (docId) {
            const localContent = localStorage.getItem("micelia_doc_content_" + docId);
            if (localContent) {
                renderMarkdown(localContent);
                return;
            }
        }

        try {
            const resp = await fetch(filePath);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const md = await resp.text();
            renderMarkdown(md);
        } catch (err) {
            showError(`No se pudo cargar el documento: ${err.message}`);
        }
    }

    // SPEECH SYNTHESIS LOGIC (TEXT-TO-SPEECH FOR ELDER ACCESSIBILITY)
    let currentUtterance = null;
    let isSpeaking = false;
    let isPaused = false;
    let speechText = "";

    function initSpeechSynthesis() {
        const playBtn = document.getElementById('audio-play-btn');
        const stopBtn = document.getElementById('audio-stop-btn');
        const statusText = document.getElementById('audio-status-text');
        const playIcon = document.getElementById('play-icon');
        const playText = document.getElementById('play-text');

        if (!('speechSynthesis' in window)) {
            document.getElementById('audio-control-bar').style.display = 'none';
            return;
        }

        playBtn.addEventListener('click', () => {
            if (!isSpeaking) {
                // Start speaking
                startSpeaking();
            } else if (isSpeaking && !isPaused) {
                // Pause
                window.speechSynthesis.pause();
                isPaused = true;
                playIcon.textContent = 'play_arrow';
                playText.textContent = 'Reanudar';
                statusText.textContent = 'Lectura pausada';
                playBtn.classList.remove('speaking');
            } else if (isSpeaking && isPaused) {
                // Resume
                window.speechSynthesis.resume();
                isPaused = false;
                playIcon.textContent = 'pause';
                playText.textContent = 'Pausar';
                statusText.textContent = 'Leyendo artículo...';
                playBtn.classList.add('speaking');
            }
        });

        stopBtn.addEventListener('click', () => {
            stopSpeaking();
        });
    }

    function startSpeaking() {
        const playBtn = document.getElementById('audio-play-btn');
        const stopBtn = document.getElementById('audio-stop-btn');
        const statusText = document.getElementById('audio-status-text');
        const playIcon = document.getElementById('play-icon');
        const playText = document.getElementById('play-text');

        // Cancel previous speakings
        window.speechSynthesis.cancel();

        // Extract clean text to speak
        const article = document.getElementById('article-content');
        // Get text ignoring headers that are metadata, links or visual badges
        const paragraphs = Array.from(article.querySelectorAll('p, li, h2, h3'))
            .map(el => el.textContent)
            .join('. ');

        speechText = paragraphs;

        if (!speechText.trim()) return;

        currentUtterance = new SpeechSynthesisUtterance(speechText);
        currentUtterance.lang = 'es-CL'; // Chilean spanish accent if available
        currentUtterance.rate = 0.95; // slightly slower for accessibility

        currentUtterance.onstart = () => {
            isSpeaking = true;
            isPaused = false;
            playIcon.textContent = 'pause';
            playText.textContent = 'Pausar';
            statusText.textContent = 'Leyendo artículo...';
            playBtn.classList.add('speaking');
            stopBtn.style.display = 'flex';
        };

        currentUtterance.onend = () => {
            stopSpeaking();
        };

        currentUtterance.onerror = () => {
            stopSpeaking();
        };

        window.speechSynthesis.speak(currentUtterance);
    }

    function stopSpeaking() {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        isPaused = false;
        
        const playBtn = document.getElementById('audio-play-btn');
        const stopBtn = document.getElementById('audio-stop-btn');
        const statusText = document.getElementById('audio-status-text');
        const playIcon = document.getElementById('play-icon');
        const playText = document.getElementById('play-text');

        playIcon.textContent = 'play_arrow';
        playText.textContent = 'Escuchar';
        statusText.textContent = 'Modo lectura disponible';
        playBtn.classList.remove('speaking');
        stopBtn.style.display = 'none';
    }

    // Stop speaking when leaving page
    window.addEventListener('beforeunload', () => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    });

    function renderMarkdown(md) {
        // Extract first line (title) and second line (meta)
        const lines = md.split('\n');
        const title = lines[0].replace(/^#+\s*/, '');
        const metaLine = lines.find(l => l.startsWith('*Categoría:'));
        const category = metaLine ? metaLine.match(/Categoría: ([^·]+)/)?.[1]?.trim() : 'Artículo';

        // Update nav category
        document.getElementById('doc-category').textContent = category || 'Artículo';

        // Render full markdown
        const html = marked.parse(md);
        const article = document.getElementById('article-content');
        article.innerHTML = html;

        // Wrap images and add realistic steam overlay for recipes
        const isRecipe = filePath && filePath.toLowerCase().includes('receta');
        article.querySelectorAll('img').forEach((img) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'recipe-image-wrapper';
            
            // Insert wrapper before image, and append image into wrapper
            img.parentNode.insertBefore(wrapper, img);
            wrapper.appendChild(img);
            
            if (isRecipe) {
                // Add steam overlay with rising particles
                const steamOverlay = document.createElement('div');
                steamOverlay.className = 'steam-overlay';
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'steam-particle';
                    particle.style.left = `${15 + Math.random() * 70}%`;
                    particle.style.width = `${30 + Math.random() * 40}px`;
                    particle.style.height = `${30 + Math.random() * 40}px`;
                    particle.style.animationDelay = `${Math.random() * 3.5}s`;
                    particle.style.animationDuration = `${3 + Math.random() * 2}s`;
                    steamOverlay.appendChild(particle);
                }
                wrapper.appendChild(steamOverlay);
                
                // Add hot badge overlay
                const badge = document.createElement('div');
                badge.innerHTML = '♨️ Preparación Caliente';
                badge.style.position = 'absolute';
                badge.style.top = '1rem';
                badge.style.right = '1rem';
                badge.style.background = 'rgba(10, 15, 12, 0.85)';
                badge.style.border = '1px solid var(--accent-gold)';
                badge.style.color = 'var(--accent-gold)';
                badge.style.fontSize = '0.75rem';
                badge.style.fontWeight = 'bold';
                badge.style.padding = '0.35rem 0.75rem';
                badge.style.borderRadius = '20px';
                badge.style.backdropFilter = 'blur(5px)';
                badge.style.zIndex = '3';
                wrapper.appendChild(badge);
            }
        });

        // =====================================================================
        // POST-PROCESADO: ACORDEONES INTERACTIVOS PARA FAQ
        // =====================================================================
        // Buscamos si hay un título de Preguntas Frecuentes
        const faqHeaders = Array.from(article.querySelectorAll('h2, h3')).filter(el => 
            el.textContent.toLowerCase().includes('preguntas frecuentes')
        );

        faqHeaders.forEach(faqHeader => {
            const faqGroup = document.createElement('div');
            faqGroup.className = 'faq-accordion-group';
            
            // Recoger todas las preguntas (h4) y sus respuestas (p) consecutivas
            let current = faqHeader.nextElementSibling;
            const toRemove = [];
            
            while (current && current.tagName !== 'H2' && current.tagName !== 'H3' && current.tagName !== 'HR') {
                if (current.tagName === 'H4') {
                    const questionText = current.innerHTML;
                    const nextEl = current.nextElementSibling;
                    
                    if (nextEl && nextEl.tagName === 'P') {
                        const answerHtml = nextEl.innerHTML;
                        
                        // Crear item acordeón
                        const faqItem = document.createElement('div');
                        faqItem.className = 'faq-item';
                        faqItem.innerHTML = `
                            <div class="faq-trigger">
                                <h4>${questionText}</h4>
                                <span class="material-symbols-outlined">expand_more</span>
                            </div>
                            <div class="faq-content">
                                <p>${answerHtml}</p>
                            </div>
                        `;
                        
                        // Toggle click logic
                        faqItem.querySelector('.faq-trigger').addEventListener('click', () => {
                            const isActive = faqItem.classList.contains('active');
                            
                            // Close all other FAQ items in this group
                            faqGroup.querySelectorAll('.faq-item').forEach(item => {
                                item.classList.remove('active');
                                item.querySelector('.faq-content').style.maxHeight = null;
                            });
                            
                            if (!isActive) {
                                faqItem.classList.add('active');
                                const content = faqItem.querySelector('.faq-content');
                                content.style.maxHeight = content.scrollHeight + 32 + "px"; // scrollHeight + padding
                            }
                        });
                        
                        faqGroup.appendChild(faqItem);
                        toRemove.push(current, nextEl);
                    }
                }
                current = current.nextElementSibling;
            }
            
            // Insertar grupo antes del primer elemento a remover
            if (toRemove.length > 0) {
                toRemove[0].parentNode.insertBefore(faqGroup, toRemove[0]);
                toRemove.forEach(el => el.remove());
            }
        });

        // =====================================================================
        // POST-PROCESADO: TARJETA INTERACTIVA DE APRENDIZAJE
        // =====================================================================
        // Buscamos títulos como "Lo que aprendimos hoy" o "Lo más valioso"
        const learningHeaders = Array.from(article.querySelectorAll('h2, h3')).filter(el => 
            el.textContent.toLowerCase().includes('lo que aprendimos hoy') ||
            el.textContent.toLowerCase().includes('lo más valioso')
        );

        learningHeaders.forEach(learningHeader => {
            let nextUl = learningHeader.nextElementSibling;
            
            // A veces hay un párrafo vacío o un separador en el medio
            if (nextUl && nextUl.tagName !== 'UL') {
                nextUl = nextUl.nextElementSibling;
            }
            
            if (nextUl && nextUl.tagName === 'UL') {
                const learningCard = document.createElement('div');
                learningCard.className = 'learning-card';
                
                // Creamos cabecera premium de la tarjeta
                learningCard.innerHTML = `
                    <h3>
                        <span class="material-symbols-outlined">verified</span>
                        ${learningHeader.textContent}
                    </h3>
                `;
                
                const cardUl = document.createElement('ul');
                
                // Transformar li originales en items interactivos con checkbox
                Array.from(nextUl.querySelectorAll('li')).forEach(li => {
                    const cardLi = document.createElement('li');
                    const cleanText = li.innerHTML.replace(/^✔\s*/, ''); // Remover viñeta si ya la tiene
                    cardLi.innerHTML = `
                        <span class="checkbox-icon material-symbols-outlined">check_box_outline_blank</span>
                        <p>${cleanText}</p>
                    `;
                    
                    // Click para marcar como completado
                    cardLi.addEventListener('click', () => {
                        const isDone = cardLi.classList.toggle('completed');
                        const icon = cardLi.querySelector('.checkbox-icon');
                        icon.textContent = isDone ? 'check_box' : 'check_box_outline_blank';
                    });
                    
                    cardUl.appendChild(cardLi);
                });
                
                learningCard.appendChild(cardUl);
                
                // Insertar tarjeta interactiva antes del header y borrar el header y ul originales
                learningHeader.parentNode.insertBefore(learningCard, learningHeader);
                learningHeader.remove();
                nextUl.remove();
            }
        });

        // =====================================================================
        // POST-PROCESADO: EFECTOS DE APARICIÓN AL HACER SCROLL (AOS)
        // =====================================================================
        // Añadir clase de reveal a todos los elementos del cuerpo del artículo
        article.querySelectorAll('p, li, h2, h3, blockquote, .recipe-image-wrapper, .learning-card, .faq-item').forEach(el => {
            el.classList.add('reveal-item');
        });

        // Show article, hide loading
        document.getElementById('loading').style.display = 'none';
        article.style.display = 'block';

        // Re-render MathJax
        if (window.MathJax) {
            MathJax.typesetPromise([article]).catch(console.error);
        }

        // Scroll to top
        window.scrollTo(0, 0);

        // Setup speech synthesis controls
        initSpeechSynthesis();

        // Setup scroll triggers
        initScrollTriggers();
    }

    // SCROLL ANIMATIONS AND PROGRESS BAR TRIGGER
    function initScrollTriggers() {
        const progressBar = document.getElementById('reading-progress');
        const revealItems = document.querySelectorAll('.reveal-item');

        function onScroll() {
            // 1. Reading Progress Bar
            const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            progressBar.style.width = scrolled + "%";

            // 2. Animate items on scroll (Reveal)
            const triggerBottom = window.innerHeight * 0.92;
            revealItems.forEach(item => {
                const itemTop = item.getBoundingClientRect().top;
                if (itemTop < triggerBottom) {
                    item.classList.add('revealed');
                }
            });
        }

        window.addEventListener('scroll', onScroll);
        // Trigger initial check for visible elements
        setTimeout(onScroll, 100);
    }

    function showError(msg) {
        document.getElementById('loading').innerHTML = `
            <span class="material-symbols-outlined" style="font-size:3rem;color:#c3b59f;display:block;margin-bottom:1rem;">error_outline</span>
            <p>${msg}</p>
            <a href="biblioteca.html" style="color:#4a8c42;margin-top:1rem;display:inline-block;">← Volver a la Biblioteca</a>
        `;
    }

    // Quick Edit Functions
    let currentMdContent = "";
    window.openQuickEditModal = async function() {
        if (docId) {
            const localContent = localStorage.getItem("micelia_doc_content_" + docId);
            if (localContent) {
                currentMdContent = localContent;
            } else {
                try {
                    const resp = await fetch(filePath);
                    if (resp.ok) {
                        currentMdContent = await resp.text();
                    }
                } catch (e) {
                    console.error("Error cargando markdown original:", e);
                }
            }
        }
        document.getElementById("quick-edit-content").value = currentMdContent;
        document.getElementById("quick-edit-modal").classList.add("open");
    };

    window.closeQuickEditModal = function() {
        document.getElementById("quick-edit-modal").classList.remove("open");
    };

    window.saveQuickEdit = function(event) {
        event.preventDefault();
        const content = document.getElementById("quick-edit-content").value;
        if (docId) {
            localStorage.setItem("micelia_doc_content_" + docId, content);
            renderMarkdown(content);
            closeQuickEditModal();
            alert("Artículo guardado exitosamente.");
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadDoc();
        initMyceliumBg();
    });
    </script>

    <!-- Modal del Editor Rápido de Markdown -->
    <div class="modal" id="quick-edit-modal">
        <div class="modal-content" style="max-width: 700px; max-height: 90vh; overflow-y: auto; background: var(--bg-card); border: 1px solid var(--accent-gold); border-radius: 20px;">
            <button class="close-modal-btn" onclick="closeQuickEditModal()">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h2 style="font-family: var(--font-display); color: var(--accent-gold); margin-bottom: 1.5rem;">Editar Contenido de Artículo</h2>
            
            <form id="quick-edit-form" onsubmit="saveQuickEdit(event)">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="quick-edit-content" style="color: var(--accent-gold); font-size: 0.85rem;">Contenido del Artículo (Markdown)</label>
                    <textarea id="quick-edit-content" required placeholder="# Título del Artículo..." rows="18" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(195,181,159,0.2); border-radius: 8px; color: #fff; margin-bottom: 1.5rem; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeQuickEditModal()" style="border: 1px solid rgba(195,181,159,0.3); background: transparent; color: var(--accent-gold); cursor: pointer; padding: 0.6rem 1.2rem; border-radius: 20px;">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="background: var(--accent-gold); color: #000; font-weight: 600; border: none; cursor: pointer; padding: 0.6rem 1.2rem; border-radius: 20px;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</body>
