<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector · Micelia</title>
    <meta name="description" content="Visualizador de documentos científicos Micelia. Renderizado Markdown con soporte MathJax para fórmulas biológicas.">
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Stylesheets compartidos de la plataforma -->
    <link rel="stylesheet" href="public.css">

    <!-- Fonts y símbolos -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1" rel="stylesheet">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- JS de la plataforma para sincronización de sesión y carrito -->
    <script src="public.js" defer></script>

    <!-- MathJax for formulas -->
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        svg: { fontCache: 'global' }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Variables específicas del lector en armonía con public.css */
        :root {
            --bg-card-reader: rgba(12, 25, 15, 0.92);
            --border-reader: rgba(195, 181, 159, 0.12);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.45;
            pointer-events: none;
        }

        .doc-category {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-green-light);
            background: rgba(74,140,66,0.1);
            border: 1px solid rgba(74,140,66,0.2);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
        }

        /* Article container */
        .article-wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 7rem 1.5rem 6rem;
            box-sizing: border-box;
        }

        /* Prose / Markdown typography */
        .prose {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 3rem;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            line-height: 1.8;
        }

        /* Recipe images and realistic steam animation */
        .recipe-image-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            border-radius: 16px;
            overflow: hidden;
            margin: 2rem 0;
            border: 1px solid rgba(195, 181, 159, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        .recipe-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recipe-image-wrapper:hover img {
            transform: scale(1.04);
        }

        .steam-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80%;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
        }

        .steam-particle {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(6px);
            animation: steamRise 4s infinite ease-out;
            opacity: 0;
        }

        @keyframes steamRise {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-200px) scale(2.2) rotate(20deg);
                opacity: 0;
            }
        }

        .prose h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(195,181,159,0.2);
        }

        .prose .doc-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            margin-bottom: 2.5rem;
        }

        .prose h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(195,181,159,0.1);
        }

        .prose h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #b5d4ad;
            margin: 2rem 0 0.75rem;
        }

        .prose h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 1.5rem 0 0.5rem;
        }

        .prose p {
            color: #c8d5c4;
            margin-bottom: 1.25rem;
            font-size: 1.02rem;
        }

        .prose strong { color: var(--text-primary); font-weight: 600; }

        .prose em { font-style: italic; color: var(--accent-gold); }

        .prose a {
            color: var(--accent-green-light);
            text-decoration: none;
            border-bottom: 1px solid rgba(74,140,66,0.3);
            transition: all 0.2s;
        }
        .prose a:hover { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

        .prose ul, .prose ol {
            margin: 1rem 0 1.5rem 1.5rem;
            color: #c8d5c4;
        }
        .prose li { margin-bottom: 0.4rem; line-height: 1.7; }
        .prose ul li::marker { color: var(--accent-green-light); }

        .prose blockquote {
            border-left: 3px solid var(--accent-gold);
            background: rgba(195,181,159,0.04);
            padding: 1rem 1.5rem;
            border-radius: 0 12px 12px 0;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .prose code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            color: var(--accent-green-light);
            background: rgba(74,140,66,0.08);
            padding: 0.15rem 0.4rem;
            border-radius: 5px;
        }

        .prose pre {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .prose pre code {
            background: transparent;
            padding: 0;
            color: #9fe89d;
            font-size: 0.88rem;
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.93rem;
        }

        .prose th {
            background: rgba(195,181,159,0.08);
            color: var(--accent-gold);
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(195,181,159,0.2);
            font-weight: 600;
        }

        .prose td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
            color: #c8d5c4;
        }

        .prose tr:hover td { background: rgba(195,181,159,0.02); }

        .prose hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Nav footer links */
        .doc-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        .doc-nav a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 0.75rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .doc-nav a:hover { color: var(--accent-gold); border-color: var(--border-hover); }
        .doc-nav a .material-symbols-outlined { font-size: 1.1rem; }

        @media (max-width: 768px) {
            .article-wrapper {
                padding: 6.5rem 1rem 4rem;
            }
            .prose {
                padding: 1.5rem 1.25rem;
            }
            .prose h1 {
                font-size: 1.6rem;
            }
            .recipe-image-wrapper {
                height: 230px;
                margin: 1.5rem 0;
            }
            .doc-nav {
                flex-direction: column;
                gap: 0.75rem;
            }
            .doc-nav a {
                justify-content: center;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Navbar Superior Unificada -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="logo.png" class="brand-logo-img" alt="Micelia Logo">
                <span class="brand-name">MICELIA</span>
            </div>
            <div class="nav-links">
                <a href="index.html#inicio" class="nav-link">Inicio</a>
                <a href="index.html#estilos-vida" class="nav-link">Para Ti</a>
                <a href="biblioteca.html" class="nav-link active">Biblioteca</a>
                <a href="index.html#tienda" class="nav-link">Comprar</a>
                <a href="#" class="nav-link" id="login-nav-btn">Iniciar Sesión</a>
                <div class="profile-nav-container" id="profile-nav-container" style="display: none; cursor: pointer;">
                    <span class="avatar-icon material-symbols-outlined"
                        style="font-size: 1.5rem; vertical-align: middle; color: var(--accent-gold);">account_circle</span>
                    <span class="profile-name" id="profile-name-text"
                        style="font-size: 0.95rem; font-weight: 500; color: var(--accent-gold); margin-left: 0.25rem;">María
                        G.</span>
                </div>
            </div>
            <button class="cart-btn" id="open-cart-btn">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span class="cart-count">0</span>
            </button>
        </div>
    </nav>

    <!-- Article -->
    <div class="article-wrapper">
        <!-- Indicador de Categoría -->
        <div style="margin-bottom: 1.5rem;">
            <span class="doc-category" id="doc-category" style="display: inline-block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-green-light); background: rgba(74, 140, 66, 0.1); border: 1px solid rgba(74, 140, 66, 0.2); padding: 0.3rem 0.8rem; border-radius: 20px;">Cargando...</span>
        </div>
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Cargando artículo...</p>
        </div>

        <article id="article-content" class="prose" style="display:none;"></article>

        <nav class="doc-nav">
            <a href="biblioteca.html">
                <span class="material-symbols-outlined">grid_view</span>
                Ver todos los artículos
            </a>
            <a href="index.html">
                <span class="material-symbols-outlined">storefront</span>
                Volver al Portal
            </a>
        </nav>
    </div>

    <script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('file');
    const titleParam = params.get('title');

    // Set page title
    if (titleParam) {
        document.title = `${titleParam} · Micelia`;
    }

    // Fetch and render markdown
    async function loadDoc() {
        if (!filePath) {
            showError('No se especificó ningún documento.');
            return;
        }

        try {
            const resp = await fetch(filePath);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const md = await resp.text();
            renderMarkdown(md);
        } catch (err) {
            showError(`No se pudo cargar el documento: ${err.message}`);
        }
    }

    function renderMarkdown(md) {
        // Extract first line (title) and second line (meta)
        const lines = md.split('\n');
        const title = lines[0].replace(/^#+\s*/, '');
        const metaLine = lines.find(l => l.startsWith('*Categoría:'));
        const category = metaLine ? metaLine.match(/Categoría: ([^·]+)/)?.[1]?.trim() : 'Artículo';

        // Update nav category
        document.getElementById('doc-category').textContent = category || 'Artículo';

        // Render full markdown
        const html = marked.parse(md);
        const article = document.getElementById('article-content');
        article.innerHTML = html;

        // Wrap images and add realistic steam overlay for recipes
        const isRecipe = filePath && filePath.toLowerCase().includes('receta');
        article.querySelectorAll('img').forEach((img) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'recipe-image-wrapper';
            
            // Insert wrapper before image, and append image into wrapper
            img.parentNode.insertBefore(wrapper, img);
            wrapper.appendChild(img);
            
            if (isRecipe) {
                // Add steam overlay with rising particles
                const steamOverlay = document.createElement('div');
                steamOverlay.className = 'steam-overlay';
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'steam-particle';
                    particle.style.left = `${15 + Math.random() * 70}%`;
                    particle.style.width = `${30 + Math.random() * 40}px`;
                    particle.style.height = `${30 + Math.random() * 40}px`;
                    particle.style.animationDelay = `${Math.random() * 3.5}s`;
                    particle.style.animationDuration = `${3 + Math.random() * 2}s`;
                    steamOverlay.appendChild(particle);
                }
                wrapper.appendChild(steamOverlay);
                
                // Add hot badge overlay
                const badge = document.createElement('div');
                badge.innerHTML = '♨️ Preparación Caliente';
                badge.style.position = 'absolute';
                badge.style.top = '1rem';
                badge.style.right = '1rem';
                badge.style.background = 'rgba(10, 15, 12, 0.85)';
                badge.style.border = '1px solid var(--accent-gold)';
                badge.style.color = 'var(--accent-gold)';
                badge.style.fontSize = '0.75rem';
                badge.style.fontWeight = 'bold';
                badge.style.padding = '0.35rem 0.75rem';
                badge.style.borderRadius = '20px';
                badge.style.backdropFilter = 'blur(5px)';
                badge.style.zIndex = '3';
                wrapper.appendChild(badge);
            }
        });

        // Show article, hide loading
        document.getElementById('loading').style.display = 'none';
        article.style.display = 'block';

        // Re-render MathJax
        if (window.MathJax) {
            MathJax.typesetPromise([article]).catch(console.error);
        }

        // Scroll to top
        window.scrollTo(0, 0);
    }

    function showError(msg) {
        document.getElementById('loading').innerHTML = `
            <span class="material-symbols-outlined" style="font-size:3rem;color:#c3b59f;display:block;margin-bottom:1rem;">error_outline</span>
            <p>${msg}</p>
            <a href="biblioteca.html" style="color:#4a8c42;margin-top:1rem;display:inline-block;">← Volver a la Biblioteca</a>
        `;
    }

    loadDoc();

    // =====================================================================
    // THREE.JS — Fondo Micelial (mismo que biblioteca.html)
    // =====================================================================
    function initMyceliumBg() {
        const container = document.getElementById('canvas-container');
        const W = window.innerWidth, H = window.innerHeight;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 1000);
        camera.position.set(0, 0, 30);

        const nodeCount = 60;
        const nodePositions = Array.from({ length: nodeCount }, () => new THREE.Vector3(
            (Math.random() - 0.5) * 80,
            (Math.random() - 0.5) * 50,
            (Math.random() - 0.5) * 30
        ));

        const linePositions = [];
        for (let i = 0; i < nodeCount; i++) {
            for (let j = i + 1; j < nodeCount; j++) {
                if (nodePositions[i].distanceTo(nodePositions[j]) < 14) {
                    linePositions.push(nodePositions[i].x, nodePositions[i].y, nodePositions[i].z);
                    linePositions.push(nodePositions[j].x, nodePositions[j].y, nodePositions[j].z);
                }
            }
        }

        const lineGeo = new THREE.BufferGeometry();
        lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
        scene.add(new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ color: 0x2d5a27, transparent: true, opacity: 0.2 })));

        const pointGeo = new THREE.BufferGeometry();
        pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(nodePositions.flatMap(p => [p.x, p.y, p.z]), 3));
        scene.add(new THREE.Points(pointGeo, new THREE.PointsMaterial({ color: 0xc3b59f, size: 0.3, transparent: true, opacity: 0.5 })));

        let t = 0;
        (function animate() {
            requestAnimationFrame(animate);
            t += 0.0003;
            scene.rotation.y = t * 0.2;
            renderer.render(scene, camera);
        })();

        window.addEventListener('resize', () => {
            const nW = window.innerWidth, nH = window.innerHeight;
            camera.aspect = nW / nH;
            camera.updateProjectionMatrix();
            renderer.setSize(nW, nH);
        });
    }

    initMyceliumBg();
    </script>
</body>
</html>
